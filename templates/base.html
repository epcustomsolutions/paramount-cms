{% load static %}
<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>{% block title %}Paramount CMS{% endblock %}</title>
    <link rel="icon" href="{% static 'img/favicon-gold.png' %}" type="image/png" sizes="32x32" />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
    />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"
    />
    <link rel="stylesheet" href="{% static 'css/app.css' %}" />
    <script src="https://unpkg.com/htmx.org@1.9.12"></script>
  </head>
  <body>
    <header class="app-header">
      <div class="container py-2" style="max-width: var(--app-max-width);">
        <div class="d-flex align-items-center justify-content-between gap-2 flex-wrap">
          <div class="d-flex align-items-center gap-3 flex-wrap min-w-0">
            <div class="fw-bold brand text-truncate">Paramount CMS</div>

            {% with ns=request.resolver_match.namespace %}
              <nav class="d-flex gap-1 flex-wrap align-items-center">
                <a
                  class="nav-link p-0 {% if ns == 'scheduling' %}active{% endif %}"
                  href="{% url 'scheduling:schedule' %}"
                  {% if ns == 'scheduling' %}aria-current="page"{% endif %}
                >
                  Schedule
                </a>
                <a
                  class="nav-link p-0 {% if ns == 'clients' %}active{% endif %}"
                  href="{% url 'clients:client-list' %}"
                  {% if ns == 'clients' %}aria-current="page"{% endif %}
                >
                  Clients
                </a>
                <a
                  class="nav-link p-0 {% if ns == 'claims' %}active{% endif %}"
                  href="{% url 'claims:claim-list' %}"
                  {% if ns == 'claims' %}aria-current="page"{% endif %}
                >
                  Claims
                </a>
                <a
                  class="nav-link p-0 {% if ns == 'tools' %}active{% endif %}"
                  href="{% url 'tools:tools-home' %}"
                  {% if ns == 'tools' %}aria-current="page"{% endif %}
                >
                  Tools
                </a>
              </nav>
            {% endwith %}
          </div>

          <div class="small">
            {% if user.is_authenticated %}
              <span class="text-muted">
                <i class="bi bi-person-circle me-1" aria-hidden="true"></i>
                {{ user.get_username }}
              </span>
              <span class="mx-2 text-muted">|</span>
              <a href="{% url 'logout' %}" class="text-decoration-none">Log Out</a>
            {% else %}
              <a href="{% url 'login' %}" class="text-decoration-none">
                <i class="bi bi-box-arrow-in-right me-1" aria-hidden="true"></i>
                Sign In
              </a>
            {% endif %}
          </div>
        </div>
      </div>
    </header>
    <main class="container" style="max-width: var(--app-max-width);">
      {% block content %}{% endblock %}
    </main>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  </body>
</html>
