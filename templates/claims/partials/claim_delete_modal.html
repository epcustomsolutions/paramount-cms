{# Expects: claim #}
<div class="modal-header border-bottom-0 pb-0">
  <h2 class="modal-title h5 mb-0 text-danger">Delete Claim</h2>
  <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
</div>
<form
  method="post"
  class="app-modal-form"
  hx-post="{% url 'claims:claim-delete' claim.id %}"
  hx-target="#claim-modal-inner"
  hx-swap="innerHTML"
>
  {% csrf_token %}
  {% if source %}
    <input type="hidden" name="source" value="{{ source }}" />
  {% endif %}
  <div class="modal-body pt-2">
    <p class="mb-2">Are you sure you want to delete claim <strong>{{ claim.claim_number }}</strong>?</p>
    <p class="text-secondary small mb-0">
      This removes the claim and all associated notes and documents.
    </p>
  </div>
  <div class="modal-footer border-top-0 pt-0">
    <button type="button" class="btn btn-outline-secondary" data-bs-dismiss="modal">Cancel</button>
    <button type="submit" class="btn btn-danger">
      <span class="spinner-border spinner-border-sm htmx-indicator me-2" aria-hidden="true"></span>
      Delete Claim
    </button>
  </div>
</form>
