{# Expects: notes #}
{% if notes %}
  <div class="vstack gap-3">
    {% for note in notes %}
      <div class="app-panel app-panel--compact">
        <div class="d-flex justify-content-between align-items-start mb-1">
          <span class="small text-muted">
            {{ note.created_at|date:"M j, Y g:i A" }}
            {% if note.created_by %} &middot; {{ note.created_by.username }}{% endif %}
          </span>
        </div>
        <div style="white-space: pre-wrap;">{{ note.content }}</div>
      </div>
    {% endfor %}
  </div>
{% else %}
  <p class="text-secondary mb-0">No notes yet.</p>
{% endif %}
