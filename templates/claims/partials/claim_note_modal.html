{# Expects: claim, note_form, post_url #}
<div class="modal-header border-bottom-0 pb-0">
  <h2 class="modal-title h5 mb-0" id="note-modal-label">Add Note</h2>
  <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
</div>
<form
  method="post"
  class="app-modal-form"
  hx-post="{{ post_url }}"
  hx-target="#note-modal-inner"
  hx-swap="innerHTML"
>
  {% csrf_token %}
  <div class="modal-body pt-2">
    <p class="app-modal-subtitle mb-3">Claim {{ claim.claim_number }}</p>
    {% if note_form.non_field_errors %}
      <div class="alert alert-danger py-2 mb-3">{{ note_form.non_field_errors }}</div>
    {% endif %}
    <div>
      <label class="form-label fw-medium" for="{{ note_form.content.id_for_label }}">Note</label>
      {{ note_form.content }}
      {% if note_form.content.errors %}
        <div class="app-form-error">{{ note_form.content.errors }}</div>
      {% endif %}
    </div>
  </div>
  <div class="modal-footer border-top-0 pt-0">
    <button type="button" class="btn btn-outline-secondary" data-bs-dismiss="modal">Cancel</button>
    <button type="submit" class="btn btn-primary">
      <span class="spinner-border spinner-border-sm htmx-indicator me-2" aria-hidden="true"></span>
      Save
    </button>
  </div>
</form>
