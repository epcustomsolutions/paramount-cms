{% extends "base.html" %}

{% block title %}Schedule{% endblock %}

{% block content %}
  <div class="app-section-header">
    <h1 class="app-page-title">Schedule</h1>
    <button
      type="button"
      class="btn btn-primary btn-sm"
      hx-get="{% url 'scheduling:appointment-create' %}"
      hx-target="#appointment-modal-inner"
      hx-swap="innerHTML"
      data-bs-toggle="modal"
      data-bs-target="#appointment-modal"
    >
      New Appointment
    </button>
  </div>

  {# FullCalendar v6 bundle does not publish index.global.min.css on the CDN; styles ship with the global JS. #}
  <script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.11/index.global.min.js"></script>

  <div class="app-card">
    <div class="app-card-body">
      <div id="calendar" style="max-width: 1200px;"></div>
    </div>
  </div>

  <form class="d-none">{% csrf_token %}</form>

  <div
    class="modal fade"
    id="appointment-modal"
    tabindex="-1"
    aria-labelledby="appointment-modal-label"
    aria-hidden="true"
  >
    <div class="modal-dialog modal-xl modal-dialog-scrollable">
      <div class="modal-content" id="appointment-modal-inner"></div>
    </div>
  </div>

  <script>
    document.addEventListener("DOMContentLoaded", function () {
      const calendarEl = document.getElementById("calendar");
      const q = "{{ q|escapejs }}";
      const createUrl = "{% url 'scheduling:appointment-create' %}";
      const rescheduleUrlTpl = "{% url 'scheduling:appointment-reschedule' 0 %}";

      function getCsrfToken() {
        const input = document.querySelector("[name=csrfmiddlewaretoken]");
        return input ? input.value : "";
      }

      function pad2(n) {
        return String(n).padStart(2, "0");
      }

      function toLocalDateTimeString(d) {
        return (
          d.getFullYear() +
          "-" +
          pad2(d.getMonth() + 1) +
          "-" +
          pad2(d.getDate()) +
          "T" +
          pad2(d.getHours()) +
          ":" +
          pad2(d.getMinutes())
        );
      }

      function rescheduleUrlForId(id) {
        return rescheduleUrlTpl.replace("/0/reschedule/", "/" + String(id) + "/reschedule/");
      }

      function openAppointmentModal(url) {
        const modalEl = document.getElementById("appointment-modal");
        if (!modalEl) {
          window.location.href = url;
          return;
        }
        const modal = bootstrap.Modal.getOrCreateInstance(modalEl);
        modal.show();
        if (window.htmx && window.htmx.ajax) {
          window.htmx.ajax("GET", url, { target: "#appointment-modal-inner", swap: "innerHTML" });
        } else {
          window.location.href = url;
        }
      }

      function saveReschedule(event) {
        return fetch(rescheduleUrlForId(event.id), {
          method: "POST",
          credentials: "same-origin",
          headers: {
            "Content-Type": "application/json",
            "X-CSRFToken": getCsrfToken(),
            Accept: "application/json",
          },
          body: JSON.stringify({
            start: toLocalDateTimeString(event.start),
            end: toLocalDateTimeString(event.end),
          }),
        }).then(function (res) {
          return res.json().then(function (body) {
            return { ok: res.ok && body && body.ok, body: body };
          });
        });
      }

      const calendar = new FullCalendar.Calendar(calendarEl, {
        initialView: "timeGridWeek",
        allDaySlot: false,
        slotMinTime: "07:00:00",
        slotMaxTime: "18:00:00",
        slotDuration: "00:15:00",
        snapDuration: "00:15:00",
        slotLabelInterval: "01:00:00",
        defaultTimedEventDuration: "00:30:00",
        editable: true,
        eventResizableFromStart: true,
        height: "86vh",
        expandRows: true,
        showNonCurrentDates: false,
        headerToolbar: {
          left: "prev,next today",
          center: "title",
          right: "dayGridMonth,timeGridWeek,timeGridDay",
        },
        dateClick: function (info) {
          if (info.allDay) {
            return;
          }
          const start = info.date;
          const end = new Date(start.getTime() + 30 * 60 * 1000);
          const url =
            createUrl +
            "?start=" +
            encodeURIComponent(toLocalDateTimeString(start)) +
            "&end=" +
            encodeURIComponent(toLocalDateTimeString(end));
          openAppointmentModal(url);
        },
        events: function (fetchInfo, successCallback, failureCallback) {
          const start = encodeURIComponent(fetchInfo.startStr);
          const end = encodeURIComponent(fetchInfo.endStr);
          const url = "{% url 'scheduling:appointment-events' %}" + "?start=" + start + "&end=" + end + "&q=" + encodeURIComponent(q);

          fetch(url)
            .then((res) => res.json())
            .then((data) => successCallback(data))
            .catch((err) => failureCallback(err));
        },
        eventClick: function (info) {
          if (info.event && info.event.url) {
            info.jsEvent.preventDefault();
            openAppointmentModal(info.event.url);
          }
        },
        eventResize: function (info) {
          saveReschedule(info.event).then(function (result) {
            if (!result.ok) {
              info.revert();
              alert((result.body && result.body.error) || "Reschedule Failed.");
            }
          });
        },
        eventDrop: function (info) {
          saveReschedule(info.event).then(function (result) {
            if (!result.ok) {
              info.revert();
              alert((result.body && result.body.error) || "Reschedule Failed.");
            }
          });
        },
      });

      calendar.render();

      document.addEventListener(
        "closeAppointmentModal",
        function () {
          const modalEl = document.getElementById("appointment-modal");
          if (!modalEl) {
            return;
          }
          const inst = bootstrap.Modal.getInstance(modalEl);
          if (inst) {
            inst.hide();
          }
        },
        true
      );

      document.addEventListener(
        "refetchCalendar",
        function () {
          calendar.refetchEvents();
        },
        true
      );
    });
  </script>
{% endblock %}
