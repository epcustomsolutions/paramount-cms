{# Expects: client #}
<div class="modal-header border-bottom-0 pb-0">
  <h2 class="modal-title h5 mb-0 text-danger">Delete Client</h2>
  <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
</div>
<form
  method="post"
  class="app-modal-form"
  hx-post="{% url 'clients:client-delete' client.id %}"
  hx-target="#client-modal-inner"
  hx-swap="innerHTML"
>
  {% csrf_token %}
  <div class="modal-body pt-2">
    <p class="mb-2">Are you sure you want to delete <strong>{{ client.full_name }}</strong>?</p>
    <p class="text-secondary small mb-0">
      This removes the client and all of their claims, notes, and documents. Appointments may remain with records unlinked.
    </p>
  </div>
  <div class="modal-footer border-top-0 pt-0">
    <button type="button" class="btn btn-outline-secondary" data-bs-dismiss="modal">Cancel</button>
    <button type="submit" class="btn btn-danger">
      <span class="spinner-border spinner-border-sm htmx-indicator me-2" aria-hidden="true"></span>
      Delete Client
    </button>
  </div>
</form>
